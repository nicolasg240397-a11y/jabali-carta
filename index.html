<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta QR - Jabalí</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-brand">
                <div class="logo-container">
                    <img src="logo.png" alt="Jabalí Logo" class="brand-logo">
                </div>
                <h1 class="logo">JABALÍ</h1>
            </div>
            <p class="subtitle">Elegí una de las tres barras</p>
        </header>

        <nav class="category-nav">
            <button class="nav-btn active" data-target="pizzeria">Pizzería</button>
            <button class="nav-btn" data-target="hamburgueseria">Hamburguesería</button>
            <button class="nav-btn" data-target="tragos">Tragos</button>
        </nav>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar plato, trago o bebida..." autocomplete="off">
        </div>

        <div class="diet-filters">
            <button class="diet-btn active" data-filter="all">Todos</button>
            <button class="diet-btn" data-filter="vegano">🌱 Vegano</button>
            <button class="diet-btn" data-filter="vegetariano">🥦 Vegetariano</button>
            <button class="diet-btn" data-filter="sin-alcohol">🚫 Sin Alcohol</button>
        </div>

        <main class="menu-content">
            <div id="menu-root"></div>
        </main>

        <!-- Back to top button -->
        <button id="backToTopBtn" title="Volver arriba">↑</button>

        <!-- Developer footer -->
        <footer class="dev-footer">
            <p class="dev-credit">⚡ Carta digital desarrollada por <strong>Nicolás Gómez</strong></p>
            <a href="https://instagram.com/nicogomezp10" target="_blank" rel="noopener noreferrer"
                class="dev-instagram">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">

    </div>
    <script src="app.js"></script>

</body>

</html>
