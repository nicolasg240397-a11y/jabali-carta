<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Wall Street - Precios en Vivo</title>
    <meta name="description" content="Pantalla de precios en vivo estilo Wall Street para bar y restaurant">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lightweight Charts for Candlestick rendering -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>
    <!-- Ticker tape top -->
    <div class="ticker-tape" id="ticker-tape" aria-hidden="true">
        <div class="ticker-content" id="ticker-content"></div>
    </div>

    <!-- Header -->
    <header class="ws-header">
        <div class="header-left">
            <h1 class="logo">
                <span class="logo-icon">📈</span>
                BAR WALL STREET
            </h1>
        </div>
        <div class="header-center" id="crash-container"></div>
        <div class="header-right">
            <div class="next-update" id="next-update">
                <span class="next-update-label">PRÓX. ACTUALIZACIÓN</span>
                <span class="next-update-time" id="countdown">10:00</span>
            </div>
            <time class="clock" id="clock">--:--:--</time>
        </div>
    </header>

    <!-- Main price board Grid -->
    <main class="price-board" id="price-board">
        <!-- Rendered dynamically by JS as Trading Cards -->
    </main>

    <!-- Footer ticker -->
    <footer class="ws-footer">
        <div class="footer-left">
            <span class="ws-status" id="ws-status">
                <span class="ws-dot"></span>
                EN VIVO
            </span>
        </div>
        <div class="footer-right">
            <span class="footer-text">Los precios se actualizan cada 10 minutos según la demanda</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
