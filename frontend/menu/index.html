<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Evitar caché en el navegador -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Bar Wall Street - Menú en Vivo</title>

    <script>
        // Forzar recarga si la página se carga desde la memoria caché del navegador (ej. botón "Atrás")
        window.addEventListener('pageshow', function (event) {
            if (event.persisted) {
                window.location.reload(true);
            }
        });
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_v3.css" id="main-css">
    <!-- Añadir timestamp para evitar caché en archivos estáticos -->
    <script>
        const version = new Date().getTime();
    </script>
</head>

<body>
    <div id="crash-overlay" class="hidden">
        <div class="crash-text">¡MARKET CRASH!</div>
        <div class="crash-subtext">Todos los precios por el piso</div>
    </div>

    <header>
        <div class="header-top">
            <h1>Bar Wall Street</h1>
            <div id="market-status" class="status-badge open">Mercado Abierto</div>
        </div>
        <div class="header-subtitle">
            <span>Precios en tiempo real</span>
            <span id="price-timer-container" class="timer-container hidden">
                <span class="timer-label">Próxima act. en:</span>
                <span id="price-timer" class="timer-badge">🕒 --:--</span>
            </span>
        </div>
    </header>

    <main>
        <div class="loader-container" id="initial-loader">
            <div class="spinner"></div>
            <p>Conectando al mercado...</p>
        </div>

        <div id="menu-container" class="hidden">
            <!-- Las categorías y productos se inyectarán aquí -->
        </div>
    </main>

    <footer>
        <p>Los precios cambian constantemente según la demanda. ¡Aprovecha las caídas!</p>
    </footer>

    <!-- Templates -->
    <template id="category-template">
        <div class="category-section">
            <h2 class="category-title"></h2>
            <div class="product-list"></div>
        </div>
    </template>

    <template id="product-template">
        <div class="product-card">
            <div class="product-info">
                <div class="product-title">
                    <span class="product-emoji"></span>
                    <span class="product-name"></span>
                </div>
                <!-- Optional: Stock bar -->
                <div class="stock-container hidden">
                    <div class="stock-bar">
                        <div class="stock-fill"></div>
                    </div>
                </div>
            </div>
            <div class="price-container">
                <div class="current-price"></div>
                <!-- Arrow will be injected here if price changes -->
            </div>
        </div>
    </template>

    <!-- Archivo JS -->
    <script src="script_v3.js"></script>
    <script>
        // Actualizar src de script y css en tiempo de ejecución para evitar caché agresivo
        document.getElementById('main-css').href = 'style_v3.css?v=' + version;
        document.querySelector('script[src="script_v3.js"]').src = 'script_v3.js?v=' + version;
    </script>
</body>

</html>
