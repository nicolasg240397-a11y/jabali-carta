<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Wall Street - Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- PIN Overlay -->
    <div id="pin-overlay" class="pin-overlay">
        <div class="pin-box">
            <h2>🔒 Acceso Restringido</h2>
            <p>Ingrese PIN de administrador</p>
            <input type="password" id="pin-input" placeholder="****" autofocus>
            <button id="pin-submit" class="btn-primary">Ingresar</button>
            <p id="pin-error" class="error-msg hidden">PIN Incorrecto</p>
        </div>
    </div>

    <div id="dashboard-content" class="hidden container">
        <header>
            <div class="header-left">
                <h1>📊 Analytics - Bar Wall Street</h1>
                <span class="live-badge">🔴 En Vivo</span>
            </div>
            <div class="header-right">
                <button id="refresh-btn" class="btn-ghost" aria-label="Actualizar">↻ Actualizar</button>
                <time id="clock">--:--:--</time>
            </div>
        </header>

        <main>
            <!-- Summary Cards -->
            <section class="summary-grid">
                <div class="card stat-card">
                    <h3 class="stat-title">Recaudación Total</h3>
                    <div class="stat-value text-green" id="dash-revenue">$0</div>
                </div>
                <div class="card stat-card">
                    <h3 class="stat-title">Pedidos Totales</h3>
                    <div class="stat-value" id="dash-orders">0</div>
                </div>
                <div class="card stat-card">
                    <h3 class="stat-title">Artículos Vendidos</h3>
                    <div class="stat-value" id="dash-items">0</div>
                </div>
            </section>

            <div class="main-grid">
                <!-- Top Products -->
                <section class="card panel">
                    <h2>🏆 Top 5 Productos (Recaudación)</h2>
                    <div id="top-products-list" class="top-products-list">
                        <!-- Injected via JS -->
                    </div>
                </section>

                <!-- Recent Sales -->
                <section class="card panel">
                    <h2>📝 Últimas 30 Ventas</h2>
                    <div class="table-container">
                        <table class="sales-table">
                            <thead>
                                <tr>
                                    <th>Hora</th>
                                    <th>Producto</th>
                                    <th>Uds.</th>
                                    <th>Precio Venta</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="sales-history-body">
                                <!-- Injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
